# Деплой на GitHub Pages (после push в main/master или вручную: Actions → Run workflow)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build for GitHub Pages (relative asset paths)
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      # GitHub Pages: 404.html = index.html (SPA + прямые ссылки)
      - name: Add 404.html for Pages
        run: cp dist/index.html dist/404.html

      - name: Verify build output
        run: |
          test -f dist/index.html
          ls -la dist/assets/ | head -5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
